version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: ./compose/linkedin/Dockerfile
    # Khởi chạy db, migrate và bật server Django quản trị CRM
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py setup_crm &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - django_data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  daemon:
    build:
      context: .
      dockerfile: ./compose/linkedin/Dockerfile
    volumes:
      - .:/app
      - django_data:/app/data
    ports:
      - "6080:6080"
      - "5900:5900"
    env_file:
      - .env
    environment:
      - DISPLAY=:99
      - ENABLE_VNC=true
    depends_on:
      - web
    restart: always

volumes:
  django_data:
